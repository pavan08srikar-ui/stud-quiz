<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script type=" module">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ✅ YOUR CONFIG (you already have it — just paste)
  const firebaseConfig = {
    apiKey: "AIzaSyBIwlN43YSN2yuJtJdJsMqacubkiojesDo",
    authDomain: "quiz-8a1c1.firebaseapp.com",
    projectId: "quiz-8a1c1",
    storageBucket: "quiz-8a1c1.firebasestorage.app",
    messagingSenderId: "140003858383",
    appId: "1:140003858383:web:9f21383bb637ba9793a4ba",
    measurementId: "G-QBH36M8NX8"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function getData() {
    const querySnapshot = await getDocs(collection(db, "students"));
    const list = document.getElementById("list");

    querySnapshot.forEach((doc) => {
      const data = doc.data();
      const li = document.createElement("li");
      li.textContent = data.name + " - " + data.marks;
      list.appendChild(li);
    });
  }

  getData();
</script>

</body>
